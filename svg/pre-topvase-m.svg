<text transform="matrix(0.9824 0 0 1 201.4016 120.2905)"><tspan x="0" y="0" class="st4 st5 st6">This vase was created during </tspan><tspan x="0" y="28.8" class="st4 st5 st6">the Yuan Dynasty (1271-1368). </tspan><tspan x="0" y="57.6" class="st4 st5 st6">It was originally exported to the </tspan><tspan x="0" y="86.4" class="st4 st5 st6">Islamic market.</tspan></text>
