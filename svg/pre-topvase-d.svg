<rect x="1629" y="2005.9" class="st3" width="196.3" height="166.2"/>
<text transform="matrix(0.9824 0 0 1 1651.481 2024.1746)"><tspan x="0" y="0" class="st4 st5 st6">The peony is the </tspan><tspan x="3.4" y="28.8" class="st4 st5 st6">&apos;king of flowers,&apos; </tspan><tspan x="46.5" y="57.6" class="st4 st5 st6">symbolizing </tspan><tspan x="21.7" y="86.4" class="st4 st5 st6">wealth, status, </tspan><tspan x="4.5" y="115.2" class="st4 st5 st6">and the majesty </tspan><tspan x="69.5" y="144" class="st4 st5 st6">of royalty.</tspan></text>
<rect x="1662.1" y="1539.2" class="st3" width="163.2" height="166.2"/>
<text transform="matrix(0.9824 0 0 1 1702.8521 1557.495)"><tspan x="0" y="0" class="st4 st5 st6">Jingdezhen </tspan><tspan x="12.3" y="28.8" class="st4 st5 st6">porcelains </tspan><tspan x="-12.5" y="57.6" class="st4 st5 st6">have at least </tspan><tspan x="-7.9" y="86.4" class="st4 st5 st6">three layers.</tspan></text>
<rect x="1583.6" y="1753.7" class="st3" width="231.1" height="184.5"/>
<text transform="matrix(0.9824 0 0 1 1583.5669 1772.0042)"><tspan x="0" y="0" class="st4 st5 st6">The peony is </tspan><tspan x="0" y="28.8" class="st4 st5 st6">presented from </tspan><tspan x="0" y="57.6" class="st4 st5 st6">different perspectives </tspan><tspan x="0" y="86.4" class="st4 st5 st6">to showcase the </tspan><tspan x="0" y="115.2" class="st4 st5 st6">beauty of the flower </tspan><tspan x="0" y="144" class="st4 st5 st6">from various angles.</tspan></text>
<g>
	<rect x="1564.3" y="2259.2" class="st3" width="248.9" height="227.8"/>
	<text transform="matrix(0.9824 0 0 1 1564.2866 2277.4961)"><tspan x="0" y="0" class="st4 st5 st6">The bottom is </tspan><tspan x="0" y="28.8" class="st4 st5 st6">decorated with seven </tspan><tspan x="0" y="57.6" class="st4 st5 st6">hanging branch </tspan><tspan x="0" y="86.4" class="st4 st5 st6">patterns, with a </tspan><tspan x="0" y="115.2" class="st4 st5 st6">uniform rhythm that </tspan><tspan x="0" y="144" class="st4 st5 st6">provides a sense of </tspan><tspan x="0" y="172.8" class="st4 st5 st6">balance and stability.</tspan></text>
</g>
<g>
	<rect x="1582.3" y="316" class="st3" width="254.7" height="139.8"/>
	<text transform="matrix(0.9824 0 0 1 1582.3091 334.2812)"><tspan x="0" y="0" class="st4 st5 st6">Eleven consecrated </tspan><tspan x="0" y="28.8" class="st4 st5 st6">decorative frames are </tspan><tspan x="0" y="57.6" class="st4 st5 st6">painted with Taoist </tspan><tspan x="0" y="86.4" class="st4 st5 st6">patterns and </tspan><tspan x="0" y="115.2" class="st4 st5 st6">auspicious symbols.</tspan></text>
</g>
