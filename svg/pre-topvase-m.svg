<rect x="534.1" y="1773.3" class="st3" width="222.4" height="175.2"/>
<text transform="matrix(0.9824 0 0 1 582.675 1791.5974)"><tspan x="0" y="0" class="st4 st5 st6">The peony is the </tspan><tspan x="3.4" y="28.8" class="st4 st5 st6">&apos;king of flowers,&apos; </tspan><tspan x="-35.9" y="57.6" class="st4 st5 st6">symbolizing wealth, </tspan><tspan x="17.4" y="86.4" class="st4 st5 st6">status, and the </tspan><tspan x="-22.2" y="115.2" class="st4 st5 st6">majesty of royalty.</tspan></text>
<rect x="619.5" y="1361.2" class="st3" width="139.9" height="142.5"/>
<text transform="matrix(0.9824 0 0 1 637.0471 1379.4707)"><tspan x="0" y="0" class="st4 st5 st6">Jingdezhen </tspan><tspan x="12.3" y="28.8" class="st4 st5 st6">porcelains </tspan><tspan x="-12.5" y="57.6" class="st4 st5 st6">have at least </tspan><tspan x="-7.9" y="86.4" class="st4 st5 st6">three layers.</tspan></text>
<rect x="522.2" y="1533.1" class="st3" width="234.9" height="177.2"/>
<text transform="matrix(0.9824 0 0 1 522.2297 1551.3889)"><tspan x="0" y="0" class="st4 st5 st6">The peony is </tspan><tspan x="0" y="28.8" class="st4 st5 st6">presented from </tspan><tspan x="0" y="57.6" class="st4 st5 st6">different perspectives </tspan><tspan x="0" y="86.4" class="st4 st5 st6">to showcase the </tspan><tspan x="0" y="115.2" class="st4 st5 st6">beauty of the flower </tspan><tspan x="0" y="144" class="st4 st5 st6">from various angles.</tspan></text>
<g>
	<rect x="495.7" y="1966.5" class="st3" width="238.4" height="211"/>
	<text transform="matrix(0.9824 0 0 1 495.6995 1984.793)"><tspan x="0" y="0" class="st4 st5 st6">The bottom is </tspan><tspan x="0" y="28.8" class="st4 st5 st6">decorated with seven </tspan><tspan x="0" y="57.6" class="st4 st5 st6">hanging branch </tspan><tspan x="0" y="86.4" class="st4 st5 st6">patterns, with a </tspan><tspan x="0" y="115.2" class="st4 st5 st6">uniform rhythm that </tspan><tspan x="0" y="144" class="st4 st5 st6">provides a sense of </tspan><tspan x="0" y="172.8" class="st4 st5 st6">balance and stability.</tspan></text>
</g>
<g>
	<rect x="551.2" y="256.5" class="st3" width="211.9" height="163.8"/>
	<text transform="matrix(0.9824 0 0 1 551.1526 274.7776)"><tspan x="0" y="0" class="st4 st5 st6">Eleven consecrated </tspan><tspan x="0" y="28.8" class="st4 st5 st6">decorative frames </tspan><tspan x="0" y="57.6" class="st4 st5 st6">are painted with </tspan><tspan x="0" y="86.4" class="st4 st5 st6">Taoist patterns and </tspan><tspan x="0" y="115.2" class="st4 st5 st6">auspicious </tspan><tspan x="0" y="144" class="st4 st5 st6">symbols.</tspan></text>
</g>
